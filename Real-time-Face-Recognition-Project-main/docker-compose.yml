services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: face_surveillance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./face_dataset:/app/face_dataset

volumes:
  postgres_data:
