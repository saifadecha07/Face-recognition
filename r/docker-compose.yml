services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: face_surveillance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/face_surveillance
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"

volumes:
  postgres_data:
