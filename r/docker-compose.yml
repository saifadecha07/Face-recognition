services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: face_surveillance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/face_surveillance
    ports:
      - "8000:8000"

volumes:
  postgres_data:
